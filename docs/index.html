<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク進捗ボード</title>
<style>
  :root {
    --paper: #faf9f5;
    --ink: #1c1b18;
    --ink-soft: #6b6659;
    --rule: #ddd8cc;
    --todo: #5c6670;
    --progress: #c97d2c;
    --done: #5b7a5c;
    --epic-1: #6d4fc9;
    --epic-2: #1a73b5;
    --epic-3: #b5406a;
    --epic-4: #1f8a63;
    --epic-5: #c9762f;
    --epic-6: #3b6fd6;
    --epic-7: #a5388a;
    --epic-8: #4a7a2b;
    --unclassified: #8b8574;
    --today-line: #1554b3;
    --mono: "SFMono-Regular", "JetBrains Mono", Consolas, Menlo, monospace;
    --sans: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
  }

  header {
    padding: 3rem 1.5rem 1.5rem;
    max-width: 960px;
    margin: 0 auto;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 0.6rem;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    margin: 0 0 0.9rem;
    letter-spacing: -0.01em;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }

  .pulse {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--done);
    box-shadow: 0 0 0 0 rgba(91,122,90,0.5);
    animation: pulse 2.4s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(91,122,90,0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(91,122,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(91,122,90,0); }
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .summary-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 1rem 0 1.8rem;
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  .summary-bar span.count {
    font-size: 1rem;
    color: var(--ink);
  }

  .legend { display: flex; align-items: center; gap: 0.4rem; color: var(--ink-soft); }
  .swatch { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
    padding: 0.6rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    white-space: nowrap;
  }

  tbody td {
    padding: 0.75rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    font-size: 0.88rem;
    vertical-align: top;
  }

  tbody tr:hover { background: rgba(28,27,24,0.03); }

  .task-key {
    font-family: var(--mono);
    font-size: 0.76rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .task-key a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--rule); }
  .task-key a:hover { color: var(--ink); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--mono);
    font-size: 0.74rem;
    white-space: nowrap;
  }

  .badge .swatch { width: 7px; height: 7px; }

  .muted { color: var(--ink-soft); font-family: var(--mono); font-size: 0.8rem; }

  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    color: var(--ink-soft);
    font-size: 0.78rem;
    font-family: var(--mono);
  }

  .empty, .error {
    padding: 3rem 0;
    text-align: center;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
    font-family: var(--mono);
  }

  .tab {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 0.4rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 3px;
  }

  .tab.active {
    color: var(--ink);
    border-color: var(--ink-soft);
    background: rgba(28,27,24,0.03);
  }

  .tl-container { font-family: var(--mono); font-size: 0.78rem; }

  .tl-scroll { overflow-x: auto; overflow-y: hidden; }

  .tl-scale {
    display: flex;
    height: 1.6rem;
    border-bottom: 1px solid var(--rule);
  }

  .tl-scale-spacer {
    position: sticky;
    left: 0;
    z-index: 3;
    width: 200px;
    flex-shrink: 0;
    background: var(--paper);
  }

  .tl-scale-ticks {
    position: relative;
    width: var(--track-width);
    flex-shrink: 0;
  }

  .tl-tick {
    position: absolute;
    top: 0;
    border-left: 1px solid var(--rule);
    padding-left: 4px;
    color: var(--ink-soft);
    font-size: 0.7rem;
    white-space: nowrap;
  }

  .tl-groups {
    position: relative;
    margin-top: 0.5rem;
    width: calc(200px + var(--track-width));
  }

  .tl-grid-overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 200px;
    width: var(--track-width);
    pointer-events: none;
  }

  .tl-week-gridline {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(28,27,24,0.06);
    z-index: 0;
  }

  .tl-gridline {
    position: absolute;
    top: 0;
    bottom: 0;
    border-left: 1px dashed var(--rule);
    z-index: 1;
  }

  .tl-today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--today-line);
    box-shadow: 0 0 0 1px rgba(21,84,179,0.15);
    z-index: 2;
  }

  .tl-group { position: relative; z-index: 1; }

  .tl-epic-dot {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    background: var(--epic-color, var(--ink-soft));
    flex-shrink: 0;
    margin-left: 0.3rem;
  }

  .tl-epic-title {
    display: inline-block;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .tl-epic-title-text {
    display: inline-block;
    border-bottom: 2px solid var(--epic-color, var(--rule));
    padding-bottom: 1px;
    line-height: 1.3;
  }

  .tl-row {
    display: flex;
    align-items: center;
    min-height: 1.9rem;
    border-bottom: 1px solid var(--rule);
  }

  .tl-row-epic { font-weight: 600; }

  .tl-row-child .tl-row-label { padding-left: 1.1rem; }

  .tl-row-label {
    position: sticky;
    left: 0;
    z-index: 3;
    background: var(--paper);
    width: 200px;
    flex-shrink: 0;
    padding-right: 0.6rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    gap: 0.4rem;
    align-items: baseline;
  }

  .tl-status-pill {
    display: inline-block;
    padding: 0.05rem 0.45rem;
    border-radius: 999px;
    font-size: 0.64rem;
    line-height: 1.5;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tl-status-pill.status-new { background: var(--todo); }
  .tl-status-pill.status-indeterminate { background: var(--progress); }
  .tl-status-pill.status-done { background: var(--done); }

  .tl-row-summary { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tl-row-track { position: relative; flex: none; width: var(--track-width); height: 1rem; }

  .tl-bar {
    position: absolute;
    height: 0.85rem;
    top: 0.075rem;
    border-radius: 2px;
    min-width: 3px;
  }

  .tl-bar.tentative {
    opacity: 0.55;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.5) 3px, rgba(255,255,255,0.5) 6px);
    border: 1px dashed var(--ink-soft);
  }

  .tl-bar.epic {
    height: 7px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.9;
    border-radius: 3px;
  }

  @media (max-width: 640px) {
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tbody tr { padding: 0.8rem 0; border-bottom: 1px solid var(--rule); }
    tbody td { border: none; padding: 0.15rem 0; }
    tbody td::before {
      content: attr(data-label);
      display: inline-block;
      width: 90px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tl-container { --track-width: 100%; }
    .tl-scroll { overflow: visible; }
    .tl-scale-spacer { display: none; }
    .tl-scale-ticks, .tl-groups, .tl-grid-overlay { width: 100%; }
    .tl-grid-overlay { left: 0; }
    .tl-row { flex-direction: column; align-items: stretch; gap: 0.25rem; }
    .tl-row-label { position: static; width: auto; white-space: normal; flex-wrap: wrap; background: none; }
    .tl-row-track { width: 100%; height: 0.8rem; }
    .tl-row-child .tl-row-label { padding-left: 0.8rem; }
    .tl-epic-title-text { border-bottom-width: 1.5px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .pulse { animation: none; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Public Status Board</p>
  <h1>タスク進捗ボード</h1>
  <div class="status-row">
    <span class="pulse" aria-hidden="true"></span>
    <span id="last-updated">読み込み中…</span>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary-bar"></div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="list" role="tab" aria-selected="true">リスト</button>
    <button class="tab" data-tab="timeline" role="tab" aria-selected="false">タイムライン</button>
  </div>
  <div id="table-wrap">
    <p class="empty">読み込み中…</p>
  </div>
  <div id="timeline-wrap" hidden></div>
</main>

<footer>
  このページは1時間ごとに自動更新されます。データソース: Jira
</footer>

<script>
  const STATUS_COLOR = {
    new: "var(--todo)",
    indeterminate: "var(--progress)",
    done: "var(--done)",
  };
  const STATUS_LABEL_FALLBACK = "var(--todo)";

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit" });
  }

  function relativeTime(iso) {
    const d = new Date(iso);
    const diffMin = Math.round((Date.now() - d.getTime()) / 60000);
    if (diffMin < 1) return "たった今更新";
    if (diffMin < 60) return `${diffMin}分前に更新`;
    const diffH = Math.round(diffMin / 60);
    if (diffH < 24) return `${diffH}時間前に更新`;
    const diffD = Math.round(diffH / 24);
    return `${diffD}日前に更新`;
  }

  async function load() {
    try {
      const res = await fetch("data.json", { cache: "no-store" });
      if (!res.ok) throw new Error("data.json not found");
      const data = await res.json();
      render(data);
    } catch (err) {
      const message = `<p class="error">データを読み込めませんでした。GitHub Actions がまだ一度も実行されていない可能性があります。</p>`;
      document.getElementById("table-wrap").innerHTML = message;
      document.getElementById("timeline-wrap").innerHTML = message;
      document.getElementById("last-updated").textContent = "更新情報なし";
    }
  }

  function render(data) {
    document.getElementById("last-updated").textContent =
      `${relativeTime(data.generated_at)} ・ ${data.count}件`;

    renderSummaryBar(data);

    if (!data.tasks.length) {
      document.getElementById("table-wrap").innerHTML = `<p class="empty">該当するタスクはありません。</p>`;
      document.getElementById("timeline-wrap").innerHTML = `<p class="empty">該当するタスクはありません。</p>`;
      return;
    }

    renderList(data);
    renderTimeline(data);
  }

  function renderSummaryBar(data) {
    const counts = {};
    for (const t of data.tasks) {
      const key = t.status_category || "other";
      counts[key] = (counts[key] || 0) + 1;
    }
    const summaryBar = document.getElementById("summary-bar");
    summaryBar.innerHTML = Object.entries(counts).map(([cat, n]) => {
      const color = STATUS_COLOR[cat] || STATUS_LABEL_FALLBACK;
      return `<span class="legend"><span class="swatch" style="background:${color}"></span>${n}件</span>`;
    }).join("");
  }

  function renderList(data) {
    const rows = data.tasks.map(t => {
      const color = STATUS_COLOR[t.status_category] || STATUS_LABEL_FALLBACK;
      return `
        <tr>
          <td data-label="ID"><span class="task-key"><a href="${t.url}" target="_blank" rel="noopener">${t.key}</a></span></td>
          <td data-label="タスク名">${escapeHtml(t.summary || "—")}</td>
          <td data-label="ステータス"><span class="badge"><span class="swatch" style="background:${color}"></span>${escapeHtml(t.status || "—")}</span></td>
          <td data-label="開始日"><span class="muted">${fmtDate(t.start_date)}</span></td>
          <td data-label="期限"><span class="muted">${fmtDate(t.due_date)}</span></td>
          <td data-label="担当者">${escapeHtml(t.assignee || "未割当")}</td>
        </tr>`;
    }).join("");

    document.getElementById("table-wrap").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>タスク名</th>
            <th>ステータス</th>
            <th>開始日</th>
            <th>期限</th>
            <th>担当者</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
  }

  function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
  function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
  function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, d.getDate()); }

  function startOfWeekMonday(d) {
    const r = new Date(d);
    const day = r.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    r.setDate(r.getDate() + diff);
    r.setHours(0, 0, 0, 0);
    return r;
  }

  const TIMELINE_TAIL_BUFFER_DAYS = 5;
  const TIMELINE_FALLBACK_SPAN_DAYS = 30;

  function computeDateRange(tasks) {
    const starts = tasks.filter(t => t.start_date).map(t => new Date(t.start_date));
    const dues = tasks.filter(t => t.due_date).map(t => new Date(t.due_date));
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let min = starts.length ? new Date(Math.min(...starts))
      : dues.length ? new Date(Math.min(...dues)) : today;
    min.setHours(0, 0, 0, 0);

    const latestDue = dues.length ? new Date(Math.max(...dues)) : null;
    const latestStart = starts.length ? new Date(Math.max(...starts)) : null;
    let candidateMax = latestDue || latestStart || today;
    candidateMax.setHours(0, 0, 0, 0);
    let max = addDays(candidateMax > today ? candidateMax : today, TIMELINE_TAIL_BUFFER_DAYS);

    if (!starts.length && !dues.length) max = addDays(today, TIMELINE_FALLBACK_SPAN_DAYS);
    if (min.getTime() >= max.getTime()) max = addDays(min, TIMELINE_TAIL_BUFFER_DAYS);

    return { min, max };
  }

  const TIMELINE_DAY_WIDTH_PX = 28;

  function computeTrackWidthPx(range) {
    const days = (range.max.getTime() - range.min.getTime()) / 86400000;
    return Math.max(days * TIMELINE_DAY_WIDTH_PX, 1);
  }

  function toPercent(date, range) {
    const total = range.max.getTime() - range.min.getTime();
    const offset = date.getTime() - range.min.getTime();
    return Math.min(100, Math.max(0, (offset / total) * 100));
  }

  const MISSING_BAR_SPAN_DAYS = 2;

  function computeBarGeometry(task, range) {
    const hasStart = !!task.start_date;
    const hasDue = !!task.due_date;

    if (!hasStart && !hasDue) {
      return { kind: "none" };
    }

    if (hasStart && hasDue) {
      const s = new Date(task.start_date);
      const e = new Date(task.due_date);
      const left = toPercent(s, range);
      const right = toPercent(e, range);
      const width = Math.max(right - left, 0.6);
      return { kind: "full", left, width };
    }

    if (hasDue) {
      const e = new Date(task.due_date);
      const pseudoStart = addDays(e, -MISSING_BAR_SPAN_DAYS);
      const left = toPercent(pseudoStart, range);
      const right = toPercent(e, range);
      return { kind: "tentative-due", left, width: Math.max(right - left, 0.6) };
    }

    const s = new Date(task.start_date);
    const pseudoEnd = addDays(s, MISSING_BAR_SPAN_DAYS);
    const left = toPercent(s, range);
    const right = toPercent(pseudoEnd, range);
    return { kind: "tentative-start", left, width: Math.max(right - left, 0.6) };
  }

  function buildTimelineGroups(tasks) {
    const epics = tasks.filter(t => t.is_epic);
    const children = tasks.filter(t => !t.is_epic);
    const epicKeys = new Set(epics.map(e => e.key));

    const groups = epics.map(epic => ({ key: epic.key, epic, items: [] }));
    const groupByKey = new Map(groups.map(g => [g.key, g]));
    const unclassified = { key: "__unclassified__", epic: null, items: [] };

    for (const t of children) {
      const g = t.parent_key && groupByKey.has(t.parent_key) ? groupByKey.get(t.parent_key) : unclassified;
      g.items.push(t);
    }

    if (unclassified.items.length) groups.push(unclassified);
    return groups;
  }

  const EPIC_PALETTE = [
    "var(--epic-1)", "var(--epic-2)", "var(--epic-3)", "var(--epic-4)",
    "var(--epic-5)", "var(--epic-6)", "var(--epic-7)", "var(--epic-8)",
  ];
  const UNCLASSIFIED_COLOR = "var(--unclassified)";

  function assignEpicColors(groups) {
    let i = 0;
    for (const g of groups) {
      if (g.key === "__unclassified__") {
        g.color = UNCLASSIFIED_COLOR;
      } else {
        g.color = EPIC_PALETTE[i % EPIC_PALETTE.length];
        i++;
      }
    }
  }

  function buildMonthTicks(range) {
    const ticks = [];
    let cur = startOfMonth(range.min);
    while (cur <= range.max) {
      ticks.push({ date: cur, percent: toPercent(cur, range) });
      cur = addMonths(cur, 1);
    }
    return ticks;
  }

  function buildWeekTicks(range) {
    const ticks = [];
    let cur = startOfWeekMonday(range.min);
    while (cur <= range.max) {
      ticks.push({ date: new Date(cur), percent: toPercent(cur, range) });
      cur = addDays(cur, 7);
    }
    return ticks;
  }

  function computeTodayPercent(range) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    if (today < range.min || today > range.max) return null;
    return toPercent(today, range);
  }

  function computeEpicRollupGeometry(group, range) {
    const dated = group.items.filter(t => t.start_date || t.due_date);

    if (dated.length) {
      const lowerCandidates = dated.map(t => new Date(t.start_date || t.due_date).getTime());
      const upperCandidates = dated.map(t => new Date(t.due_date || t.start_date).getTime());
      const s = new Date(Math.min(...lowerCandidates));
      const e = new Date(Math.max(...upperCandidates));
      const left = toPercent(s, range);
      const right = toPercent(e, range);
      const width = Math.max(right - left, 0.6);
      return { kind: "rollup", left, width, start: s, due: e };
    }

    if (group.epic) {
      const own = computeBarGeometry(group.epic, range);
      if (own.kind !== "none") {
        return { ...own, start: new Date(group.epic.start_date || group.epic.due_date), due: new Date(group.epic.due_date || group.epic.start_date) };
      }
    }

    return { kind: "none" };
  }

  function timelineBarHtml(task, range, epicColor) {
    const geo = computeBarGeometry(task, range);
    const pillClass = `tl-status-pill status-${task.status_category || "new"}`;
    let barHtml = "";
    if (geo.kind !== "none") {
      const cls = ["tl-bar"];
      if (geo.kind !== "full") cls.push("tentative");
      barHtml = `<div class="${cls.join(' ')}" style="left:${geo.left}%; width:${geo.width}%; background-color:${epicColor};"
           title="${escapeHtml(task.status || '')} ${fmtDate(task.start_date)} 〜 ${fmtDate(task.due_date)}"></div>`;
    }
    return `
      <div class="tl-row tl-row-child">
        <div class="tl-row-label">
          <span class="task-key"><a href="${task.url}" target="_blank" rel="noopener">${task.key}</a></span>
          <span class="${pillClass}">${escapeHtml(task.status || "")}</span>
          <span class="tl-row-summary">${escapeHtml(task.summary || "—")}</span>
        </div>
        <div class="tl-row-track">${barHtml}</div>
      </div>`;
  }

  function timelineEpicRowHtml(group, range) {
    const epic = group.epic;
    const title = epic ? (epic.summary || epic.key) : "未分類";
    let barHtml = "";
    if (epic) {
      const geo = computeEpicRollupGeometry(group, range);
      if (geo.kind !== "none") {
        const cls = ["tl-bar", "epic"];
        if (geo.kind === "tentative-due" || geo.kind === "tentative-start") cls.push("tentative");
        const rollupNote = geo.kind === "rollup" ? "（子タスクの日程から算出）" : "";
        barHtml = `<div class="${cls.join(' ')}" style="left:${geo.left}%; width:${geo.width}%; background-color:${group.color};"
             title="${fmtDate(geo.start)} 〜 ${fmtDate(geo.due)}${rollupNote}"></div>`;
      }
    }
    return `
      <div class="tl-row tl-row-epic" style="--epic-color:${group.color}">
        <div class="tl-row-label">
          <span class="tl-epic-dot" aria-hidden="true"></span>
          <span class="tl-epic-title"><span class="tl-epic-title-text">${escapeHtml(title)}</span></span>
          ${epic ? `<span class="task-key"><a href="${epic.url}" target="_blank" rel="noopener">${epic.key}</a></span>` : ""}
        </div>
        <div class="tl-row-track">${barHtml}</div>
      </div>`;
  }

  function renderTimelineGroup(group, range) {
    const epicRowHtml = timelineEpicRowHtml(group, range);
    const rows = group.items.map(t => timelineBarHtml(t, range, group.color)).join("");

    return `
      <div class="tl-group">
        ${epicRowHtml}
        ${rows}
      </div>`;
  }

  function renderTimeline(data) {
    const wrap = document.getElementById("timeline-wrap");
    const range = computeDateRange(data.tasks);
    if (!range) {
      wrap.innerHTML = `<p class="empty">日付情報がないため、タイムラインを表示できません。</p>`;
      return;
    }

    const groups = buildTimelineGroups(data.tasks);
    assignEpicColors(groups);
    const monthTicks = buildMonthTicks(range);
    const weekTicks = buildWeekTicks(range);
    const todayPercent = computeTodayPercent(range);
    const trackWidthPx = computeTrackWidthPx(range);

    const scaleHtml = `
      <div class="tl-scale">
        <div class="tl-scale-spacer"></div>
        <div class="tl-scale-ticks">
          ${monthTicks.map(tk => `<div class="tl-tick" style="left:${tk.percent}%"><span>${tk.date.getFullYear()}-${String(tk.date.getMonth() + 1).padStart(2, '0')}</span></div>`).join("")}
        </div>
      </div>`;

    const weekGridHtml = weekTicks.map(tk => `<div class="tl-week-gridline" style="left:${tk.percent}%"></div>`).join("");
    const monthGridHtml = monthTicks.map(tk => `<div class="tl-gridline" style="left:${tk.percent}%"></div>`).join("");
    const todayLineHtml = todayPercent !== null
      ? `<div class="tl-today-line" style="left:${todayPercent}%" title="本日"></div>`
      : "";
    const gridOverlayHtml = `
      <div class="tl-grid-overlay">
        ${weekGridHtml}
        ${monthGridHtml}
        ${todayLineHtml}
      </div>`;

    wrap.innerHTML = `
      <div class="tl-container" style="--track-width:${trackWidthPx}px">
        <div class="tl-scroll">
          ${scaleHtml}
          <div class="tl-groups">
            ${gridOverlayHtml}
            ${groups.map(g => renderTimelineGroup(g, range)).join("")}
          </div>
        </div>
      </div>`;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function setupTabs() {
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => {
          t.classList.toggle("active", t === tab);
          t.setAttribute("aria-selected", t === tab ? "true" : "false");
        });
        document.getElementById("table-wrap").hidden = tab.dataset.tab !== "list";
        document.getElementById("timeline-wrap").hidden = tab.dataset.tab !== "timeline";
      });
    });
  }

  setupTabs();
  load();
</script>

</body>
</html>
