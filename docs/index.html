<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク進捗ボード</title>
<style>
  :root {
    --paper: #faf9f5;
    --ink: #1c1b18;
    --ink-soft: #6b6659;
    --rule: #ddd8cc;
    --todo: #5c6670;
    --progress: #c97d2c;
    --done: #5b7a5c;
    --mono: "SFMono-Regular", "JetBrains Mono", Consolas, Menlo, monospace;
    --sans: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
  }

  header {
    padding: 3rem 1.5rem 1.5rem;
    max-width: 960px;
    margin: 0 auto;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 0.6rem;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    margin: 0 0 0.9rem;
    letter-spacing: -0.01em;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }

  .pulse {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--done);
    box-shadow: 0 0 0 0 rgba(91,122,90,0.5);
    animation: pulse 2.4s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(91,122,90,0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(91,122,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(91,122,90,0); }
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .summary-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 1rem 0 1.8rem;
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  .summary-bar span.count {
    font-size: 1rem;
    color: var(--ink);
  }

  .legend { display: flex; align-items: center; gap: 0.4rem; color: var(--ink-soft); }
  .swatch { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
    padding: 0.6rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    white-space: nowrap;
  }

  tbody td {
    padding: 0.75rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    font-size: 0.88rem;
    vertical-align: top;
  }

  tbody tr:hover { background: rgba(28,27,24,0.03); }

  .task-key {
    font-family: var(--mono);
    font-size: 0.76rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .task-key a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--rule); }
  .task-key a:hover { color: var(--ink); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--mono);
    font-size: 0.74rem;
    white-space: nowrap;
  }

  .badge .swatch { width: 7px; height: 7px; }

  .muted { color: var(--ink-soft); font-family: var(--mono); font-size: 0.8rem; }

  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    color: var(--ink-soft);
    font-size: 0.78rem;
    font-family: var(--mono);
  }

  .empty, .error {
    padding: 3rem 0;
    text-align: center;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  @media (max-width: 640px) {
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tbody tr { padding: 0.8rem 0; border-bottom: 1px solid var(--rule); }
    tbody td { border: none; padding: 0.15rem 0; }
    tbody td::before {
      content: attr(data-label);
      display: inline-block;
      width: 90px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .pulse { animation: none; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Public Status Board</p>
  <h1>タスク進捗ボード</h1>
  <div class="status-row">
    <span class="pulse" aria-hidden="true"></span>
    <span id="last-updated">読み込み中…</span>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary-bar"></div>
  <div id="table-wrap">
    <p class="empty">読み込み中…</p>
  </div>
</main>

<footer>
  このページは1時間ごとに自動更新されます。データソース: Jira
</footer>

<script>
  const STATUS_COLOR = {
    new: "var(--todo)",
    indeterminate: "var(--progress)",
    done: "var(--done)",
  };
  const STATUS_LABEL_FALLBACK = "var(--todo)";

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit" });
  }

  function relativeTime(iso) {
    const d = new Date(iso);
    const diffMin = Math.round((Date.now() - d.getTime()) / 60000);
    if (diffMin < 1) return "たった今更新";
    if (diffMin < 60) return `${diffMin}分前に更新`;
    const diffH = Math.round(diffMin / 60);
    if (diffH < 24) return `${diffH}時間前に更新`;
    const diffD = Math.round(diffH / 24);
    return `${diffD}日前に更新`;
  }

  async function load() {
    try {
      const res = await fetch("data.json", { cache: "no-store" });
      if (!res.ok) throw new Error("data.json not found");
      const data = await res.json();
      render(data);
    } catch (err) {
      document.getElementById("table-wrap").innerHTML =
        `<p class="error">データを読み込めませんでした。GitHub Actions がまだ一度も実行されていない可能性があります。</p>`;
      document.getElementById("last-updated").textContent = "更新情報なし";
    }
  }

  function render(data) {
    document.getElementById("last-updated").textContent =
      `${relativeTime(data.generated_at)} ・ ${data.count}件`;

    const counts = {};
    for (const t of data.tasks) {
      const key = t.status_category || "other";
      counts[key] = (counts[key] || 0) + 1;
    }
    const summaryBar = document.getElementById("summary-bar");
    summaryBar.innerHTML = Object.entries(counts).map(([cat, n]) => {
      const color = STATUS_COLOR[cat] || STATUS_LABEL_FALLBACK;
      return `<span class="legend"><span class="swatch" style="background:${color}"></span>${n}件</span>`;
    }).join("");

    if (!data.tasks.length) {
      document.getElementById("table-wrap").innerHTML = `<p class="empty">該当するタスクはありません。</p>`;
      return;
    }

    const rows = data.tasks.map(t => {
      const color = STATUS_COLOR[t.status_category] || STATUS_LABEL_FALLBACK;
      return `
        <tr>
          <td data-label="ID"><span class="task-key"><a href="${t.url}" target="_blank" rel="noopener">${t.key}</a></span></td>
          <td data-label="タスク名">${escapeHtml(t.summary || "—")}</td>
          <td data-label="ステータス"><span class="badge"><span class="swatch" style="background:${color}"></span>${escapeHtml(t.status || "—")}</span></td>
          <td data-label="開始日"><span class="muted">${fmtDate(t.start_date)}</span></td>
          <td data-label="期限"><span class="muted">${fmtDate(t.due_date)}</span></td>
          <td data-label="担当者">${escapeHtml(t.assignee || "未割当")}</td>
        </tr>`;
    }).join("");

    document.getElementById("table-wrap").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>タスク名</th>
            <th>ステータス</th>
            <th>開始日</th>
            <th>期限</th>
            <th>担当者</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  load();
</script>

</body>
</html>
