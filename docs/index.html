<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク進捗ボード</title>
<style>
  :root {
    --paper: #faf9f5;
    --ink: #1c1b18;
    --ink-soft: #6b6659;
    --rule: #ddd8cc;
    --todo: #5c6670;
    --progress: #c97d2c;
    --done: #5b7a5c;
    --mono: "SFMono-Regular", "JetBrains Mono", Consolas, Menlo, monospace;
    --sans: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
  }

  header {
    padding: 3rem 1.5rem 1.5rem;
    max-width: 960px;
    margin: 0 auto;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 0.6rem;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    margin: 0 0 0.9rem;
    letter-spacing: -0.01em;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--ink-soft);
  }

  .pulse {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--done);
    box-shadow: 0 0 0 0 rgba(91,122,90,0.5);
    animation: pulse 2.4s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(91,122,90,0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(91,122,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(91,122,90,0); }
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .summary-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 1rem 0 1.8rem;
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  .summary-bar span.count {
    font-size: 1rem;
    color: var(--ink);
  }

  .legend { display: flex; align-items: center; gap: 0.4rem; color: var(--ink-soft); }
  .swatch { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
    padding: 0.6rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    white-space: nowrap;
  }

  tbody td {
    padding: 0.75rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    font-size: 0.88rem;
    vertical-align: top;
  }

  tbody tr:hover { background: rgba(28,27,24,0.03); }

  .task-key {
    font-family: var(--mono);
    font-size: 0.76rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .task-key a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--rule); }
  .task-key a:hover { color: var(--ink); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--mono);
    font-size: 0.74rem;
    white-space: nowrap;
  }

  .badge .swatch { width: 7px; height: 7px; }

  .muted { color: var(--ink-soft); font-family: var(--mono); font-size: 0.8rem; }

  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    color: var(--ink-soft);
    font-size: 0.78rem;
    font-family: var(--mono);
  }

  .empty, .error {
    padding: 3rem 0;
    text-align: center;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
    font-family: var(--mono);
  }

  .tab {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 0.4rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 3px;
  }

  .tab.active {
    color: var(--ink);
    border-color: var(--ink-soft);
    background: rgba(28,27,24,0.03);
  }

  .tl-container { font-family: var(--mono); font-size: 0.78rem; }

  .tl-scale {
    position: relative;
    height: 1.6rem;
    margin-left: 200px;
    border-bottom: 1px solid var(--rule);
  }

  .tl-tick {
    position: absolute;
    top: 0;
    border-left: 1px solid var(--rule);
    padding-left: 4px;
    color: var(--ink-soft);
    font-size: 0.7rem;
    white-space: nowrap;
  }

  .tl-groups { position: relative; margin-top: 0.5rem; }

  .tl-gridline {
    position: absolute;
    top: 0;
    bottom: 0;
    border-left: 1px dashed var(--rule);
  }

  .tl-group { border-bottom: 1px solid var(--rule); padding: 0.7rem 0; position: relative; }
  .tl-group:last-child { border-bottom: none; }

  .tl-group-header {
    display: flex;
    gap: 0.6rem;
    align-items: baseline;
    padding-left: 200px;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }

  .tl-row { display: flex; align-items: center; min-height: 1.9rem; }

  .tl-row-label {
    width: 200px;
    flex-shrink: 0;
    padding-right: 0.6rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    gap: 0.4rem;
    align-items: baseline;
  }

  .tl-row-summary { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tl-row-track { position: relative; flex: 1; height: 1rem; }

  .tl-bar {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 2px;
    min-width: 3px;
  }

  .tl-bar.tentative {
    opacity: 0.55;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.5) 3px, rgba(255,255,255,0.5) 6px);
    border: 1px dashed var(--ink-soft);
  }

  .tl-bar.epic { height: 6px; top: 5px; opacity: 0.85; }

  .tl-undated {
    padding-left: 200px;
    color: var(--ink-soft);
    font-size: 0.76rem;
    margin-top: 0.3rem;
  }

  .tl-undated .tl-undated-label {
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.68rem;
  }

  .tl-undated ul { margin: 0.3rem 0 0; padding-left: 1.1rem; }
  .tl-undated li { padding: 0.15rem 0; }

  @media (max-width: 640px) {
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tbody tr { padding: 0.8rem 0; border-bottom: 1px solid var(--rule); }
    tbody td { border: none; padding: 0.15rem 0; }
    tbody td::before {
      content: attr(data-label);
      display: inline-block;
      width: 90px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tl-scale, .tl-group-header, .tl-undated { margin-left: 0; padding-left: 0; }
    .tl-row { flex-direction: column; align-items: stretch; gap: 0.25rem; }
    .tl-row-label { width: auto; white-space: normal; }
    .tl-row-track { height: 0.8rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .pulse { animation: none; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Public Status Board</p>
  <h1>タスク進捗ボード</h1>
  <div class="status-row">
    <span class="pulse" aria-hidden="true"></span>
    <span id="last-updated">読み込み中…</span>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary-bar"></div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="list" role="tab" aria-selected="true">リスト</button>
    <button class="tab" data-tab="timeline" role="tab" aria-selected="false">タイムライン</button>
  </div>
  <div id="table-wrap">
    <p class="empty">読み込み中…</p>
  </div>
  <div id="timeline-wrap" hidden></div>
</main>

<footer>
  このページは1時間ごとに自動更新されます。データソース: Jira
</footer>

<script>
  const STATUS_COLOR = {
    new: "var(--todo)",
    indeterminate: "var(--progress)",
    done: "var(--done)",
  };
  const STATUS_LABEL_FALLBACK = "var(--todo)";

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit" });
  }

  function relativeTime(iso) {
    const d = new Date(iso);
    const diffMin = Math.round((Date.now() - d.getTime()) / 60000);
    if (diffMin < 1) return "たった今更新";
    if (diffMin < 60) return `${diffMin}分前に更新`;
    const diffH = Math.round(diffMin / 60);
    if (diffH < 24) return `${diffH}時間前に更新`;
    const diffD = Math.round(diffH / 24);
    return `${diffD}日前に更新`;
  }

  async function load() {
    try {
      const res = await fetch("data.json", { cache: "no-store" });
      if (!res.ok) throw new Error("data.json not found");
      const data = await res.json();
      render(data);
    } catch (err) {
      const message = `<p class="error">データを読み込めませんでした。GitHub Actions がまだ一度も実行されていない可能性があります。</p>`;
      document.getElementById("table-wrap").innerHTML = message;
      document.getElementById("timeline-wrap").innerHTML = message;
      document.getElementById("last-updated").textContent = "更新情報なし";
    }
  }

  function render(data) {
    document.getElementById("last-updated").textContent =
      `${relativeTime(data.generated_at)} ・ ${data.count}件`;

    renderSummaryBar(data);

    if (!data.tasks.length) {
      document.getElementById("table-wrap").innerHTML = `<p class="empty">該当するタスクはありません。</p>`;
      document.getElementById("timeline-wrap").innerHTML = `<p class="empty">該当するタスクはありません。</p>`;
      return;
    }

    renderList(data);
    renderTimeline(data);
  }

  function renderSummaryBar(data) {
    const counts = {};
    for (const t of data.tasks) {
      const key = t.status_category || "other";
      counts[key] = (counts[key] || 0) + 1;
    }
    const summaryBar = document.getElementById("summary-bar");
    summaryBar.innerHTML = Object.entries(counts).map(([cat, n]) => {
      const color = STATUS_COLOR[cat] || STATUS_LABEL_FALLBACK;
      return `<span class="legend"><span class="swatch" style="background:${color}"></span>${n}件</span>`;
    }).join("");
  }

  function renderList(data) {
    const rows = data.tasks.map(t => {
      const color = STATUS_COLOR[t.status_category] || STATUS_LABEL_FALLBACK;
      return `
        <tr>
          <td data-label="ID"><span class="task-key"><a href="${t.url}" target="_blank" rel="noopener">${t.key}</a></span></td>
          <td data-label="タスク名">${escapeHtml(t.summary || "—")}</td>
          <td data-label="ステータス"><span class="badge"><span class="swatch" style="background:${color}"></span>${escapeHtml(t.status || "—")}</span></td>
          <td data-label="開始日"><span class="muted">${fmtDate(t.start_date)}</span></td>
          <td data-label="期限"><span class="muted">${fmtDate(t.due_date)}</span></td>
          <td data-label="担当者">${escapeHtml(t.assignee || "未割当")}</td>
        </tr>`;
    }).join("");

    document.getElementById("table-wrap").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>タスク名</th>
            <th>ステータス</th>
            <th>開始日</th>
            <th>期限</th>
            <th>担当者</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
  }

  function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
  function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
  function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, d.getDate()); }

  function computeDateRange(tasks) {
    const dates = [];
    for (const t of tasks) {
      if (t.start_date) dates.push(new Date(t.start_date));
      if (t.due_date) dates.push(new Date(t.due_date));
    }
    if (!dates.length) return null;

    let min = startOfMonth(new Date(Math.min(...dates)));
    let max = endOfMonth(new Date(Math.max(...dates)));
    if (min.getTime() === max.getTime()) max = endOfMonth(addMonths(min, 1));
    return { min, max };
  }

  function toPercent(date, range) {
    const total = range.max.getTime() - range.min.getTime();
    const offset = date.getTime() - range.min.getTime();
    return Math.min(100, Math.max(0, (offset / total) * 100));
  }

  const MISSING_BAR_SPAN_DAYS = 2;

  function computeBarGeometry(task, range) {
    const hasStart = !!task.start_date;
    const hasDue = !!task.due_date;

    if (!hasStart && !hasDue) {
      return { kind: "none" };
    }

    if (hasStart && hasDue) {
      const s = new Date(task.start_date);
      const e = new Date(task.due_date);
      const left = toPercent(s, range);
      const right = toPercent(e, range);
      const width = Math.max(right - left, 0.6);
      return { kind: "full", left, width };
    }

    if (hasDue) {
      const e = new Date(task.due_date);
      const pseudoStart = addDays(e, -MISSING_BAR_SPAN_DAYS);
      const left = toPercent(pseudoStart, range);
      const right = toPercent(e, range);
      return { kind: "tentative-due", left, width: Math.max(right - left, 0.6) };
    }

    const s = new Date(task.start_date);
    const pseudoEnd = addDays(s, MISSING_BAR_SPAN_DAYS);
    const left = toPercent(s, range);
    const right = toPercent(pseudoEnd, range);
    return { kind: "tentative-start", left, width: Math.max(right - left, 0.6) };
  }

  function buildTimelineGroups(tasks) {
    const epics = tasks.filter(t => t.is_epic);
    const children = tasks.filter(t => !t.is_epic);
    const epicKeys = new Set(epics.map(e => e.key));

    const groups = epics.map(epic => ({ key: epic.key, epic, items: [] }));
    const groupByKey = new Map(groups.map(g => [g.key, g]));
    const unclassified = { key: "__unclassified__", epic: null, items: [] };

    for (const t of children) {
      const g = t.parent_key && groupByKey.has(t.parent_key) ? groupByKey.get(t.parent_key) : unclassified;
      g.items.push(t);
    }

    if (unclassified.items.length) groups.push(unclassified);
    return groups;
  }

  function buildMonthTicks(range) {
    const ticks = [];
    let cur = startOfMonth(range.min);
    while (cur <= range.max) {
      ticks.push({ date: cur, percent: toPercent(cur, range) });
      cur = addMonths(cur, 1);
    }
    return ticks;
  }

  function timelineBarHtml(task, range) {
    const geo = computeBarGeometry(task, range);
    if (geo.kind === "none") return null;
    const color = STATUS_COLOR[task.status_category] || STATUS_LABEL_FALLBACK;
    const cls = ["tl-bar"];
    if (geo.kind !== "full") cls.push("tentative");
    return `
      <div class="tl-row">
        <div class="tl-row-label">
          <span class="task-key"><a href="${task.url}" target="_blank" rel="noopener">${task.key}</a></span>
          <span class="tl-row-summary">${escapeHtml(task.summary || "—")}</span>
        </div>
        <div class="tl-row-track">
          <div class="${cls.join(' ')}" style="left:${geo.left}%; width:${geo.width}%; background-color:${color};"
               title="${escapeHtml(task.status || '')} ${fmtDate(task.start_date)} 〜 ${fmtDate(task.due_date)}"></div>
        </div>
      </div>`;
  }

  function renderTimelineGroup(group, range) {
    const title = group.epic ? (group.epic.summary || group.epic.key) : "未分類";
    const rows = group.items.map(t => timelineBarHtml(t, range)).filter(Boolean).join("");
    const undated = group.items.filter(t => !t.start_date && !t.due_date);

    let epicBarHtml = "";
    if (group.epic) {
      const geo = computeBarGeometry(group.epic, range);
      if (geo.kind !== "none") {
        const color = STATUS_COLOR[group.epic.status_category] || STATUS_LABEL_FALLBACK;
        const cls = ["tl-bar", "epic"];
        if (geo.kind !== "full") cls.push("tentative");
        epicBarHtml = `
          <div class="tl-row">
            <div class="tl-row-label"></div>
            <div class="tl-row-track">
              <div class="${cls.join(' ')}" style="left:${geo.left}%; width:${geo.width}%; background-color:${color};"
                   title="${escapeHtml(group.epic.status || '')} ${fmtDate(group.epic.start_date)} 〜 ${fmtDate(group.epic.due_date)}"></div>
            </div>
          </div>`;
      }
    }

    const undatedHtml = undated.length ? `
      <div class="tl-undated">
        <div class="tl-undated-label">日付未設定</div>
        <ul>
          ${undated.map(t => `<li><span class="task-key"><a href="${t.url}" target="_blank" rel="noopener">${t.key}</a></span> ${escapeHtml(t.summary || "—")}</li>`).join("")}
        </ul>
      </div>` : "";

    return `
      <section class="tl-group">
        <header class="tl-group-header">
          <span>${escapeHtml(title)}</span>
          ${group.epic ? `<span class="task-key"><a href="${group.epic.url}" target="_blank" rel="noopener">${group.epic.key}</a></span>` : ""}
        </header>
        ${epicBarHtml}
        ${rows}
        ${undatedHtml}
      </section>`;
  }

  function renderTimeline(data) {
    const wrap = document.getElementById("timeline-wrap");
    const range = computeDateRange(data.tasks);
    if (!range) {
      wrap.innerHTML = `<p class="empty">日付情報がないため、タイムラインを表示できません。</p>`;
      return;
    }

    const groups = buildTimelineGroups(data.tasks);
    const ticks = buildMonthTicks(range);

    const scaleHtml = `
      <div class="tl-scale">
        ${ticks.map(tk => `<div class="tl-tick" style="left:${tk.percent}%"><span>${tk.date.getFullYear()}-${String(tk.date.getMonth() + 1).padStart(2, '0')}</span></div>`).join("")}
      </div>`;

    const gridLinesHtml = ticks.map(tk => `<div class="tl-gridline" style="left:${tk.percent}%"></div>`).join("");

    wrap.innerHTML = `
      <div class="tl-container">
        ${scaleHtml}
        <div class="tl-groups">
          ${gridLinesHtml}
          ${groups.map(g => renderTimelineGroup(g, range)).join("")}
        </div>
      </div>`;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function setupTabs() {
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => {
          t.classList.toggle("active", t === tab);
          t.setAttribute("aria-selected", t === tab ? "true" : "false");
        });
        document.getElementById("table-wrap").hidden = tab.dataset.tab !== "list";
        document.getElementById("timeline-wrap").hidden = tab.dataset.tab !== "timeline";
      });
    });
  }

  setupTabs();
  load();
</script>

</body>
</html>
